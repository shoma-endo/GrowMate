name: react-doctor-to-pr
description: GrowMate React Doctor diagnosis, targeted fixes, quality gates, architecture review loop, commit, and PR creation with review summary body.
workflow_config:
  provider_options:
    codex:
      network_access: true
max_steps: 17
initial_step: react_doctor_baseline
loop_monitors:
  - cycle:
      - ai_antipattern_review
      - ai_antipattern_fix
    threshold: 3
    judge:
      persona: supervisor
      knowledge:
        - growmate
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai_antipattern_review
        - condition: 非生産的（改善なし）
          next: react_doctor_after
  - cycle:
      - review
      - fix
    threshold: 3
    judge:
      persona: supervisor
      knowledge:
        - growmate
      instruction: |
        review -> fix のループが {cycle_count} 回繰り返されました。
        最新レビューと修正内容を確認し、収束しているか判断してください。
        残件が「テスト追加要求」のみで、対象仕様書または GrowMate knowledge がテスト追加不要を明示している場合は、追加修正で解消不能な方針差分として self_review に進めてください。
      rules:
        - condition: 収束済み（残件が追加修正で解消不能な方針差分のみ）
          next: self_review
        - condition: 健全（進捗あり）
          next: review
        - condition: 非生産的（同じ指摘の反復・修正未反映）
          next: ABORT

steps:
  - name: react_doctor_baseline
    tags:
      - plan
      - review
    edit: false
    persona: planner
    knowledge:
      - architecture
      - react
      - growmate
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: |
      React Doctor の事前診断を実行し、修正計画を作成してください。

      運用前提（無人）:
      - 人間の介在点は仕様確定のみ。この workflow 実行中に人間へ質問しない。
      - 判断不能なら ABORT する。

      必須手順:
      1. `AGENTS.md`、`.takt/facets/knowledge/growmate.md`、`.agents/skills/react/SKILL.md`、`.agents/skills/implementation-guidelines/SKILL.md` を読む。
      2. 再実行 / 途中再開の現状を確認する:
         - 現在ブランチ、`git status`、未コミット差分。
         - React Doctor 作業用の既存リモートブランチ（例: `fix/react-doctor-*`）と open PR。
         - Requeue / resume なら `source_run_slug` を辿り前回レポートを参照する。
         - 既存 WIP / 既存 PR がある場合は差分追記計画にする。
      3. `npx -y react-doctor@latest . --verbose` を実行する。
      4. スコア、Actionable Issues、優先度、修正対象ファイルを記録する。
      5. Security / Correctness は必須、Performance は原則修正、Architecture は GrowMate 方針と照合して判断する。
      6. 修正対象を React Doctor が指摘した箇所に限定し、スコープ外変更を避ける計画にする。
      7. 検証ゲートは `npm run verify` と TAKT 内レビュー。ブラウザ手動確認は実施しない。
    rules:
      - condition: React Doctor 診断が完了し、修正可能（新規または既存 WIP/PR への差分追記を含む）
        next: implement
      - condition: React Doctor が実行できない
        next: ABORT
      - condition: 修正対象がない
        next: COMPLETE
    output_contracts:
      report:
        - name: react-doctor-baseline.md
          format: plan

  - name: implement
    tags:
      - coding
      - implementation
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - architecture
      - react
      - growmate
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: |
      `react-doctor-baseline.md` に記録された Actionable Issues を最小差分で修正してください。

      運用前提（無人）:
      - 実装中に人間へ質問しない。判断不能なら ABORT する。
      - 既存 WIP / 既存ブランチがある場合はそれを継続する。

      必須条件:
      - React Doctor が指摘した箇所を中心に修正する。
      - `useContext()` は `use(Context)` に置き換える。
      - `<Context.Provider value={...}>` は `<Context value={...}>` に置き換える。
      - 不要な `useMemo` / `useCallback` / `memo()` は削除する。
      - `any` を使わない。
      - UI変更を伴う場合は `.agents/skills/growmate-ui-ux/SKILL.md` を読む。
      - 簡易・形式的・低価値なユニットテストは追加しない。React Doctor の指摘はプロダクションコードの最小修正で解消する。
      - ユーザーまたは仕様書が明示した場合を除き、新規テストファイルを作成しない。
      - 実装後に `npm run verify` を実行し、失敗した場合は修正して再実行する。
      - ブラウザ手動確認は行わない（無人）。
    rules:
      - condition: 実装と必須検証が完了した
        next: ai_antipattern_review
      - condition: 判断できない、情報不足
        next: ABORT
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions

  - name: ai_antipattern_review
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    knowledge:
      - growmate
    provider_options:
      extends: review-readonly
    instruction: ai-antipattern-review
    rules:
      - condition: AI特有の問題が見つからない
        next: react_doctor_after
      - condition: AI特有の問題が検出された
        next: ai_antipattern_fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review

  - name: ai_antipattern_fix
    tags:
      - coding
      - implementation
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - architecture
      - react
      - growmate
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-antipattern-fix
    rules:
      - condition: AI Reviewerの指摘に対する修正が完了した
        next: ai_antipattern_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: react_doctor_after
      - condition: 修正を進行できない
        next: react_doctor_after

  - name: react_doctor_after
    tags:
      - review
    edit: false
    persona: reporter
    knowledge:
      - react
      - growmate
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: |
      修正後の React Doctor 再診断を実行してください。

      手順:
      1. `npx -y react-doctor@latest . --verbose` を実行する。
      2. 事前診断と比較してスコア、Actionable Issues、解消済み指摘を記録する。
      3. スコアが下がった場合、または修正対象の Actionable Issues が残っている場合は修正へ戻す。
    rules:
      - condition: スコアが改善し、修正対象の Actionable Issues が解消された
        next: review
      - condition: スコアが下がった、または修正対象の Actionable Issues が残っている
        next: implement
      - condition: React Doctor 再診断に失敗した
        next: ABORT
    output_contracts:
      report:
        - name: react-doctor-after.md
          format: validation

  - name: review
    tags:
      - review
    edit: false
    persona: architecture-reviewer
    knowledge:
      - architecture
      - react
      - growmate
    instruction: |
      `review-arch` 相当の観点で、アーキテクチャ、責務分離、React 19 / React Compiler 方針、仕様充足、既存パターンとの整合性をレビューしてください。

      GrowMate 固有条件:
      - React Doctor 修正または GrowMate knowledge がテスト追加不要を明示している場合、テスト不在のみを理由に `needs_fix` にしない。
      - 簡易・形式的・低価値なユニットテストの追加を要求しない。
      - 代替検証として React Doctor 再診断、`npm run verify` が実行されているかを確認する。
      - ブラウザ手動確認は無人運用では実施しない。未実施のみを理由に `needs_fix` にせず、未確認事項へ回す前提とする。
      - 実装上の correctness / security / data integrity / architecture 問題がある場合は具体的に `needs_fix` とする。
    rules:
      - condition: approved
        next: self_review
      - condition: needs_fix
        next: fix
    output_contracts:
      report:
        - name: architecture-review.md
          format: architecture-review

  - name: fix
    tags:
      - coding
      - implementation
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - architecture
      - react
      - growmate
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    instruction: |
      Report Directory の `architecture-review.md` と `self-review.md` を一次情報として、未解決の指摘だけを修正してください。

      必須条件:
      - architecture-reviewer の未解決指摘がある場合は、指摘対象コードを直接修正する。
      - self_review の未解決指摘がある場合は、self-review.md の該当項目を優先して修正する。
      - architecture-review.md が APPROVE で self_review 起因の差し戻しだけの場合、architecture review を再解決しようとして同じ確認を繰り返さない。
      - 修正対象が git hygiene / 不要ファイル混入 / レポート不足 / 検証証跡不足だけの場合は、その対象だけを直す。
      - React Doctor の修正範囲から大きく逸脱しない。
      - 簡易・形式的・低価値なユニットテストは追加しない。レビュー指摘はプロダクションコードの修正で解消する。
      - ユーザーまたは仕様書が明示した場合を除き、新規テストファイルを作成しない。
      - プロダクションコードを変更した場合は `npm run verify` を再実行する。
      - プロダクションコードを変更しておらず、直前の品質ゲート成功証跡がある場合は、フル再実行せず必要な git / diff 確認に絞ってよい。
      - ここでは commit / push を行わない。最終ステップでまとめて実施する。
    rules:
      - condition: architecture-reviewer の指摘を修正し、必須検証が完了した
        next: react_doctor_after
      - condition: self_review 起因の指摘だけを修正し、architecture-reviewer の open findings がない
        next: self_review
      - condition: レビュー指摘に対応するための情報が不足している
        next: react_doctor_baseline
      - condition: 修正を進行できない
        next: ABORT
    output_contracts:
      report:
        - name: fix-result.md
          format: coder-decisions

  - name: self_review
    tags:
      - review
    edit: false
    persona: supervisor
    knowledge:
      - architecture
      - react
      - growmate
    provider_options:
      extends: review-readonly
    instruction: |
      `.agents/skills/quality-gate/SKILL.md` と `.agents/skills/quality-gate/self-review.md` に従い、2パスセルフレビューを実施してください。

      確認対象:
      - React Doctor スコアが改善していること。
      - 修正対象の Actionable Issues が解消されていること。
      - `npm run verify` が成功していること。
      - architecture-reviewer の open findings がないこと。
      - PR確認用の要約に React Doctor スコア変化、解消Issues、検証結果、architecture review 結果を含められること。

      無人運用の検証方針:
      - 完了ゲートは `npm run verify` + TAKT 内レビューとする。
      - ブラウザ手動確認は実施しない。UI 変更がある場合は「手動ブラウザ確認未実施」を未確認事項候補として記録する。
      - 手動確認未実施だけを理由に不合格にしない。
    rules:
      - condition: セルフレビュー合格
        next: prepare_pr_summary
      - condition: 修正が必要
        next: fix
      - condition: 検証不足または判断不能
        next: ABORT
    output_contracts:
      report:
        - name: self-review.md
          format: supervisor-validation

  - name: prepare_pr_summary
    tags:
      - report
    edit: false
    persona: reporter
    knowledge:
      - growmate
    provider_options:
      extends: review-readonly
    instruction: |
      push 前に、Report Directory と source run chain の最新レポートから、PR 本文の正本となる `pr-summary.md` を作成してください。

      必須条件:
      - 実装やレビュー判断は行わない。確認済みの事実と意見（完了判断）を分けて整理する。
      - 読むレポートは原則として最新の `architecture-review.md`、`self-review.md`、`fix-result.md`、必要に応じて React Doctor 関連レポートまでに絞る。
      - `pr-summary.md` は GitHub PR 本文としてそのまま使える Markdown にする。先頭に PR タイトル案を1行（`# ` 見出し）で書き、続けて本文セクションを書く。
      - PR タイトル形式（必須）:
        - 日本語・1行・50字以内（`# ` を除く本文）。
        - What/Why が一覧で分かる内容にする（例: `React Doctor指摘の主要Actionable Issuesを解消する`）。
        - 禁止: `[Auto]` 接頭辞、ブランチ名だけのタイトル、`実装完了` / `対応完了` などの自己申告、英語のみ、conventional commits 接頭辞（`feat:` 等）。
      - 必須セクション（この順）:
        1. `## 概要` — React Doctor 改善の目的と範囲（2〜4文）
        2. `## 変更要点` — スコア変化、解消した Actionable Issues、主要修正（ファイル一覧の羅列は禁止）
        3. `## レビュー結果` — ai-antipattern / architecture-review / self-review の結論
        4. `## 完了判断` — 事実（verify 成功、open findings 0、対象 Issues 解消など）と完了判断を分けて書く
        5. `## 検証` — `npm run verify` 等の結果（手動ブラウザ確認は無人のため未実施が既定）
        6. `## 未確認事項` — UI 変更時は「手動ブラウザ確認未実施」を含める。その他あれば列挙。なければ「なし」
        7. `## コミットメッセージ案` — 日本語1行
      - Requeue / resume で現在の Report Directory に必要レポートが存在しない場合は、現在 run の `meta.json` にある `source_run_slug` を辿り、source run の `reports/` にある最新レポートを参照する。
      - 現在 run または source run chain のどこにも `architecture-review.md` または `self-review.md` が存在せず、レビュー結果を確認できない場合のみ不足レポートとして扱う。
    rules:
      - condition: PR 本文正本（pr-summary.md）が完了した（source run のレポート参照を含む）
        next: create_pr
      - condition: architecture-review または self-review の結果を確認できない
        next: ABORT
    output_contracts:
      report:
        - name: pr-summary.md
          format: summary

  - name: create_pr
    tags:
      - coding
    edit: true
    persona: coder
    provider: claude
    model: haiku
    knowledge:
      - growmate
    required_permission_mode: edit
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: |
      実装内容をコミット・push し、`pr-summary.md` を正本として Pull Request を作成または更新してください。プロダクションコードの編集は行わず、git / gh コマンドのみを実行してください。

      手順:
      1. Report Directory の `pr-summary.md` を読む。先頭の `# ` 行を PR タイトル、それ以降を PR 本文とする。
      2. `git status` / `git diff` で変更内容を確認する。
      3. ブランチを決める（再実行・追記を優先）:
         - 既に `fix/react-doctor-*` 等の作業ブランチにいればそのまま使う。
         - `develop` / `main` にいる場合、既存の React Doctor 作業ブランチがあれば checkout して継続する。
         - 既存がなければ `fix/react-doctor-improvements` などの英語ブランチを新規作成する。
      4. `git add` で変更をステージし、`git diff --cached` で最終確認する。無関係なローカル変更を混ぜない。
      5. `pr-summary.md` のコミットメッセージ案（なければ Why 中心の日本語1行）で `git commit` する。変更がなければ新規コミットは作らず、既存 tip で PR 更新へ進む。
      6. `git push -u origin HEAD` を実行する。
      7. base は `develop`（ブランチが `develop` の場合のみ `main`）。
      8. PR を冪等に作成または更新する（auto-pr とのレースに耐える。既存 PR への追記を含む）:
         a. `pr-summary.md` からタイトル行を除いた本文を一時ファイルに書き出して `--body-file` に渡す（シェル展開で壊さない）。
         b. `gh pr list --head <branch> --base <base> --state open` で既存 PR を確認する。
         c. 既存があれば `gh pr edit <number> --title "..." --body-file ...` で更新する（TAKT が正本。追記コミット後も本文を最新化する）。
         d. 既存がなければ `gh pr create --base ... --head ... --title "..." --body-file ...` で作成する。
         e. `gh pr create` が「already exists」等で失敗した場合は ABORT せず、再度 `gh pr list` して番号を取得し、`gh pr edit` で本文・タイトルを更新する。edit 成功なら完了とする。
         f. auto-pr の完了は待たない。再 list → edit で吸収する。
         g. 再 list でも PR が見つからない、または edit も失敗した場合のみ失敗とする。
      9. 作成/更新した PR の URL・番号・ブランチ・コミット SHA を報告する。CI 完了は待たない。

      やらないこと:
      - `@codex` レビュー依頼コメントの投稿。
      - PR のマージ・クローズ。
      - プロダクションコード編集。
      - `.takt/runs/` 配下のレポートを git にコミットすること。
      - 人間への確認待ち。
    rules:
      - condition: コミット・push・PR 作成または更新が完了した（create 失敗後の re-list → edit 成功、既存 PR 追記を含む）
        next: COMPLETE
      - condition: コミット、push、または PR 作成/更新に失敗した（re-list → edit でも回復できない場合）
        next: ABORT
