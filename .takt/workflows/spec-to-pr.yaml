name: spec-to-pr
description: GrowMate docs/plans specification to implementation, quality gates, architecture review loop, commit, and PR creation with review summary body.
workflow_config:
  provider_options:
    codex:
      network_access: true
max_steps: 26
initial_step: plan
loop_monitors:
  - cycle:
      - ai_antipattern_review
      - ai_antipattern_fix
    threshold: 3
    judge:
      persona: supervisor
      knowledge:
        - growmate
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai_antipattern_review
        - condition: 非生産的（改善なし）
          next: review
  - cycle:
      - review
      - fix
    threshold: 3
    judge:
      persona: supervisor
      knowledge:
        - growmate
      instruction: |
        review -> fix のループが {cycle_count} 回繰り返されました。
        Report Directory の最新レビューと修正結果を確認し、収束しているか判断してください。
        残件が「テスト追加要求」のみで、対象仕様書または GrowMate knowledge がテスト追加不要を明示している場合は、追加修正で解消不能な方針差分として self_review に進めてください。
      rules:
        - condition: 収束済み（残件が追加修正で解消不能な方針差分のみ）
          next: self_review
        - condition: 健全（進捗あり）
          next: review
        - condition: 非生産的（同じ指摘の反復・修正未反映）
          next: ABORT

steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge:
      - architecture
      - growmate
    provider_options:
      extends: review-readonly
    instruction: |
      `docs/plans/` の仕様書を起点に、GrowMate の実装計画を作成してください。

      運用前提（無人）:
      - 人間の介在点は `docs/plans/` の仕様確定のみ。実装中に人間へ質問しない。
      - 仕様不足・曖昧さがある場合は実装に進まず ABORT し、人間が仕様書を直して再実行する前提の確認事項を残す。

      必須手順:
      1. ユーザー指示から対象仕様書を特定する。曖昧な場合は `docs/plans/` を列挙し、候補を示して ABORT する。
      2. 対象仕様書、`AGENTS.md`、`.takt/facets/knowledge/growmate.md`、`.agents/skills/implementation-guidelines/SKILL.md` を読む。
      3. Server Actions / Route Handlers / Zod / エラー処理が関わる場合は `.agents/skills/nextjs-server/SKILL.md` を読む。
      4. UI 実装が関わる場合は `.agents/skills/growmate-ui-ux/SKILL.md` と `.agents/skills/react/SKILL.md` を読む。
      5. Supabase / migration / RLS / Service Role が関わる場合は `.agents/skills/supabase/SKILL.md` を読む。
      6. 再実行 / 途中再開の現状を確認する（新規一発前提で計画しない）:
         - 現在ブランチ、`git status`、未コミット差分の有無。
         - 対象仕様に対応しそうな既存リモートブランチ（`feature/*` / `fix/*`）と、その open PR（`gh pr list`）。
         - Requeue / resume なら `meta.json` の `source_run_slug` を辿り、前回の `plan.md` / `coder-scope.md` / `architecture-review.md` 等を参照する。
         - 既存 WIP / 既存 PR がある場合は「差分追記」計画にし、ゼロからの作り直しを避ける。
      7. 仕様要件と現行コード（および既存 WIP）の差分、変更対象、検証方法、PR本文に記載すべき関連仕様書を整理する。
      8. 対象仕様書が spec-review 済みか確認する（`.takt/workflows/spec-review.yaml` のレビューレポート）。未実施の場合はブロックしないが、計画レポートに「spec-review 未実施」と明記する。
      9. 検証ゲートは `npm run verify` と TAKT 内レビューとする。ブラウザ手動確認は無人実行では実施しない（PR の未確認事項に記載する前提）。
    rules:
      - condition: 要件が明確で実装可能（新規または既存 WIP/PR への差分追記を含む）
        next: implement
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足（仕様書の修正が必要）
        next: ABORT
        appendix: |
          人間が `docs/plans/` を修正して再実行してください:
          - {質問1}
          - {質問2}
    output_contracts:
      report:
        - name: plan.md
          format: plan

  - name: implement
    tags:
      - coding
      - implementation
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - architecture
      - growmate
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: |
      `plan.md` と対象仕様書に従い、GrowMate の既存パターンに合わせて最小差分で実装してください。

      運用前提（無人）:
      - 実装中に人間へ質問しない。判断不能・仕様不足なら ABORT する（人間は仕様書を直して再実行する）。
      - 既存 WIP / 既存ブランチがある場合はそれを継続し、無関係な作り直しをしない。

      必須条件:
      - `any` を使わない。`unknown` + narrowing または Zod schema を使う。
      - 自動生成ファイルを直接編集しない。
      - UI 変更では `growmate-ui-ux` と `react` の規約に従う。
      - Server Actions / Route Handlers では `nextjs-server` のエラー処理・Zod規約に従う。
      - Supabase Service Role 使用時は user_id 等の明示的なスコープ条件を入れる。
      - 簡易・形式的・低価値なユニットテストは追加しない。テスト追加は対象仕様書またはユーザー指示で明示されている場合に限る。
      - 実装開始前に対象仕様書の現行版を再読し、`plan.md` 作成時点の内容と食い違いがないか確認する。食い違いがあれば実装を進めず plan への差し戻しを判断する。
      - 実装後に `npm run verify` を実行し、失敗した場合は修正して再実行する。
      - ブラウザ手動確認は行わない（無人）。必要な画面確認は PR の未確認事項に回す。
    rules:
      - condition: 実装と必須検証が完了した
        next: ai_antipattern_review
      - condition: 対象仕様書が plan.md 作成後に変更されており、実装方針の再検討が必要
        next: plan
      - condition: 判断できない、情報不足（仕様書の修正が必要）
        next: ABORT
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai_antipattern_review
    tags:
      - review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    knowledge:
      - growmate
    provider_options:
      extends: review-readonly
    instruction: ai-antipattern-review
    rules:
      - condition: AI特有の問題が見つからない
        next: review
      - condition: AI特有の問題が検出された
        next: ai_antipattern_fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review

  - name: ai_antipattern_fix
    tags:
      - coding
      - implementation
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - architecture
      - growmate
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-antipattern-fix
    rules:
      - condition: AI Reviewerの指摘に対する修正が完了した
        next: ai_antipattern_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: review
      - condition: 修正を進行できない
        next: review

  - name: review
    tags:
      - review
    edit: false
    persona: architecture-reviewer
    knowledge:
      - architecture
      - growmate
    instruction: |
      `review-arch` 相当の観点で、アーキテクチャ、責務分離、データ境界、セキュリティ、仕様充足、既存パターンとの整合性をレビューしてください。

      GrowMate 固有条件:
      - 対象仕様書または GrowMate knowledge がテスト追加不要を明示している場合、テスト不在のみを理由に `needs_fix` にしない。
      - 簡易・形式的・低価値なユニットテストの追加を要求しない。
      - 代替検証として `npm run verify` が実行されているかを確認する。
      - ブラウザ手動確認は無人運用では実施しない。未実施のみを理由に `needs_fix` にせず、未確認事項へ回す前提とする。
      - 実装上の correctness / security / data integrity / architecture 問題がある場合は具体的に `needs_fix` とする。
    rules:
      - condition: approved
        next: self_review
      - condition: needs_fix
        next: fix
    output_contracts:
      report:
        - name: architecture-review.md
          format: architecture-review

  - name: fix
    tags:
      - coding
      - implementation
    edit: true
    persona: coder
    policy:
      - coding
    knowledge:
      - architecture
      - growmate
    provider_options:
      extends: edit
    required_permission_mode: edit
    pass_previous_response: false
    instruction: |
      Report Directory の `architecture-review.md` と `self-review.md` を一次情報として、未解決の指摘だけを修正してください。

      必須条件:
      - 修正着手前に対象仕様書の現行版を確認し、レビュー指摘の範囲を超える仕様変更がないか確認する。
      - architecture-reviewer の未解決指摘がある場合は、指摘対象コードを直接修正する。
      - self_review の未解決指摘がある場合は、self-review.md の該当項目を優先して修正する。
      - architecture-review.md が APPROVE で self_review 起因の差し戻しだけの場合、architecture review を再解決しようとして同じ確認を繰り返さない。
      - 修正対象が git hygiene / 不要ファイル混入 / レポート不足 / 検証証跡不足だけの場合は、その対象だけを直す。
      - テストやドキュメント追加だけで architecture-reviewer の指摘を回避しない。
      - 簡易・形式的・低価値なユニットテストは追加しない。テスト追加は対象仕様書またはユーザー指示で明示されている場合に限る。
      - 同種の潜在箇所がある場合は同時に修正する。
      - プロダクションコードを変更した場合は `npm run verify` を再実行する。
      - プロダクションコードを変更しておらず、直前の品質ゲート成功証跡がある場合は、フル再実行せず必要な git / diff 確認に絞ってよい。
      - ここでは commit / push を行わない。最終ステップでまとめて実施する。
    rules:
      - condition: architecture-reviewer の指摘を修正し、必須検証が完了した
        next: review
      - condition: self_review 起因の指摘だけを修正し、architecture-reviewer の open findings がない
        next: self_review
      - condition: レビュー指摘に対応するための情報が不足している
        next: plan
      - condition: 対象仕様書がレビュー後に変更されており、指摘の枠を超える実装方針の再検討が必要
        next: plan
      - condition: 修正を進行できない
        next: ABORT
    output_contracts:
      report:
        - name: fix-result.md
          format: coder-decisions

  - name: self_review
    tags:
      - review
    edit: false
    persona: supervisor
    knowledge:
      - architecture
      - growmate
    provider_options:
      extends: review-readonly
    instruction: |
      `.agents/skills/quality-gate/SKILL.md` と `.agents/skills/quality-gate/self-review.md` に従い、2パスセルフレビューを実施してください。

      確認対象:
      - 仕様書の全要件が実装されていること。
      - 対象仕様書（`docs/plans/` 配下）が本PRのスコープで完全実装されたか（未実装フェーズ・TODO・スコープ外セクションが残っていないか）を判定し、`self-review.md` に明記する。
      - `npm run verify` が成功していること。
      - architecture-reviewer の open findings がないこと。
      - 余計な差分や機密情報の露出がないこと。
      - PR確認用の要約に関連仕様書、検証結果、architecture review / self-review 結果、完了判断理由を含められること。

      無人運用の検証方針:
      - 完了ゲートは `npm run verify` + TAKT 内レビュー（ai-antipattern / architecture / self-review）とする。
      - ブラウザ手動確認は実施しない。UI 変更がある場合は「手動ブラウザ確認未実施」を未確認事項候補として記録する。
      - 手動確認未実施だけを理由に不合格にしない。
    rules:
      - condition: セルフレビュー合格
        next: prepare_pr_summary
      - condition: 修正が必要
        next: fix
      - condition: 検証不足または判断不能
        next: ABORT
    output_contracts:
      report:
        - name: self-review.md
          format: supervisor-validation
  - name: prepare_pr_summary
    tags:
      - report
    edit: false
    persona: reporter
    knowledge:
      - growmate
    provider_options:
      extends: review-readonly
    instruction: |
      push 前に、Report Directory と source run chain の最新レポートから、PR 本文の正本となる `pr-summary.md` を作成してください。

      必須条件:
      - 実装やレビュー判断は行わない。確認済みの事実と意見（完了判断）を分けて整理する。
      - 読むレポートは原則として最新の `architecture-review.md`、`self-review.md`、`fix-result.md`、必要に応じて `plan.md` までに絞る。
      - `coder-scope.md` / `coder-decisions.md` は存在する場合だけ参照し、存在しなくても不足レポートとして扱わない。
      - `self-review.md` の仕様書完全実装判定を読み取り、`## 関連仕様書` に転記する（実装やレビュー判断はしない、転記のみ）。
      - `pr-summary.md` は GitHub PR 本文としてそのまま使える Markdown にする。先頭に PR タイトル案を1行（`# ` 見出し）で書き、続けて本文セクションを書く。
      - PR タイトル形式（必須）:
        - 日本語・1行・50字以内（`# ` を除く本文）。
        - What/Why が一覧で分かる内容にする（例: `コンテンツ注釈の保存APIを仕様どおり実装する`）。
        - 禁止: `[Auto]` 接頭辞、ブランチ名だけのタイトル、`実装完了` / `対応完了` などの自己申告、英語のみ、conventional commits 接頭辞（`feat:` 等）。
      - 必須セクション（この順）:
        1. `## 概要` — 何を・なぜ変えたか（仕様起点、2〜4文）
        2. `## 関連仕様書` — `docs/plans/` のパス。`self-review.md` が完全実装と判定した場合は「本PR完了後 `docs/plans/xxx.md` → `docs/specs/xxx.md` へ移動」と明記する。部分実装の場合は「`docs/plans/` に残置（未実装: ○○）」と明記する
        3. `## 変更要点` — 主要変更のみ（ファイル一覧の羅列は禁止。カテゴリ単位で3〜7点）
        4. `## レビュー結果` — ai-antipattern / architecture-review / self-review の結論（approved / open findings 数）
        5. `## 完了判断` — 事実（verify 成功、open findings 0、仕様要件充足など）と、それに基づく完了判断を分けて書く
        6. `## 検証` — `npm run verify` 等の結果（手動ブラウザ確認は無人のため未実施が既定）
        7. `## 未確認事項` — UI 変更時は「手動ブラウザ確認未実施」を含める。その他あれば列挙。なければ「なし」
        8. `## コミットメッセージ案` — 日本語1行
      - 変更ファイルの詳細表は作らない。
      - Requeue / resume で現在の Report Directory に必要レポートが存在しない場合は、現在 run の `meta.json` にある `source_run_slug` を辿り、source run の `reports/` にある最新レポートを参照する。source run も Requeue の場合は、さらに `source_run_slug` を辿る。
      - 現在 run または source run chain のどこにも `architecture-review.md` または `self-review.md` が存在せず、レビュー結果を確認できない場合のみ不足レポートとして扱う。
    rules:
      - condition: PR 本文正本（pr-summary.md）が完了した（source run のレポート参照を含む）
        next: create_pr
      - condition: architecture-review または self-review の結果を確認できない
        next: ABORT
    output_contracts:
      report:
        - name: pr-summary.md
          format: summary

  - name: create_pr
    tags:
      - coding
    edit: true
    persona: coder
    provider: claude
    model: haiku
    knowledge:
      - growmate
    required_permission_mode: edit
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: |
      実装内容をコミット・push し、`pr-summary.md` を正本として Pull Request を作成または更新してください。プロダクションコードの編集は行わず、git / gh コマンドのみを実行してください。

      手順:
      1. Report Directory の `pr-summary.md` を読む。先頭の `# ` 行を PR タイトル、それ以降を PR 本文とする。
      2. `git status` / `git diff` で変更内容を確認する。
      3. ブランチを決める（再実行・追記を優先）:
         - 既に `feature/*` または `fix/*` にいて、対象仕様の作業ブランチならそのまま使う。
         - `develop` / `main` にいる場合、対象仕様に対応する既存リモートブランチがあれば checkout して継続する。
         - 既存がなければ仕様書名または機能名から `feature/...` または `fix/...` の英語ブランチを新規作成する。
      4. `pr-summary.md` の `## 関連仕様書` に `docs/plans/xxx.md` → `docs/specs/xxx.md` への移動指示がある場合、`git mv docs/plans/xxx.md docs/specs/xxx.md` を実行し実装差分と同一コミットに含める。移動指示がなければ何もしない。
      5. `git add` で変更をステージし、`git diff --cached` で最終確認する。無関係なローカル変更を混ぜない。
      6. `pr-summary.md` のコミットメッセージ案（なければ Why 中心の日本語1行）で `git commit` する。変更がなければ新規コミットは作らず、既存 tip で PR 更新へ進む。
      7. `git push -u origin HEAD` を実行する。
      8. base は `develop`（ブランチが `develop` の場合のみ `main`）。
      9. PR を冪等に作成または更新する（auto-pr とのレースに耐える。既存 PR への追記を含む）:
         a. `pr-summary.md` からタイトル行を除いた本文を一時ファイルに書き出して `--body-file` に渡す（シェル展開で壊さない）。
         b. `gh pr list --head <branch> --base <base> --state open` で既存 PR を確認する。
         c. 既存があれば `gh pr edit <number> --title "..." --body-file ...` で更新する（TAKT が正本。追記コミット後も本文を最新化する）。
         d. 既存がなければ `gh pr create --base ... --head ... --title "..." --body-file ...` で作成する。
         e. `gh pr create` が「already exists」等で失敗した場合は ABORT せず、再度 `gh pr list` して番号を取得し、`gh pr edit` で本文・タイトルを更新する。edit 成功なら完了とする。
         f. auto-pr の完了は待たない。再 list → edit で吸収する。
         g. 再 list でも PR が見つからない、または edit も失敗した場合のみ失敗とする。
      10. 作成/更新した PR の URL・番号・ブランチ・コミット SHA を報告する。CI 完了は待たない。

      やらないこと:
      - `@codex` レビュー依頼コメントの投稿。
      - PR のマージ・クローズ。
      - プロダクションコード編集。
      - `.takt/runs/` 配下のレポートを git にコミットすること。
      - 人間への確認待ち。
    rules:
      - condition: コミット・push・PR 作成または更新が完了した（create 失敗後の re-list → edit 成功、既存 PR 追記を含む）
        next: COMPLETE
      - condition: コミット、push、または PR 作成/更新に失敗した（re-list → edit でも回復できない場合）
        next: ABORT
