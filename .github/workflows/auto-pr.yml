name: Auto Create Pull Request

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches-ignore:
      - 'main'
      - 'automation/api-changelog-state'
    tags-ignore:
      - '*'

permissions:
  contents: read

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Pull Request if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_COMMITS: ${{ toJSON(github.event.commits) }}
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          LABEL_NAME="automated-pr"

          if echo "${BRANCH_NAME}" | grep -Eq '^(codex|claude)/'; then
            echo "Skip auto PR for branch: ${BRANCH_NAME}"
            exit 0
          fi

          # ベースブランチの決定
          if [ "${BRANCH_NAME}" = "develop" ]; then
            BASE_BRANCH="main"
            PR_TITLE="[Auto] Merge develop into main"
          else
            BASE_BRANCH="develop"
            PR_TITLE="[Auto] PR from ${BRANCH_NAME} to develop"
          fi

          echo "Target branch: ${BRANCH_NAME}"
          echo "Base branch: ${BASE_BRANCH}"

          # ベースブランチの存在確認（リモートに存在しない場合はエラー）
          if ! git ls-remote --heads origin "${BASE_BRANCH}" | grep -q "refs/heads/${BASE_BRANCH}"; then
            echo "Error: Base branch '${BASE_BRANCH}' does not exist on remote."
            exit 1
          fi

          git fetch --no-tags origin "${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"

          # 今回のpushに含まれるコミットメッセージのみ取得
          COMMIT_MESSAGES=$(echo "${PUSH_COMMITS}" | jq -r '.[] | "- " + (.message | split("\n")[0])')
          if [ -z "${COMMIT_MESSAGES}" ]; then
            COMMIT_MESSAGES="- (コミットメッセージなし)"
          fi

          CHANGED_FILES=$(git diff --name-only "origin/${BASE_BRANCH}...HEAD" | sed 's/^/- /')
          if [ -z "${CHANGED_FILES}" ]; then
            CHANGED_FILES="- (変更ファイルを取得できませんでした)"
          fi

          HEAD_SHA=$(git rev-parse --short HEAD)
          COMPARE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${BASE_BRANCH}...${BRANCH_NAME}"

          PR_BODY=$(cat <<EOF
          ## 概要
          ${BRANCH_NAME} から ${BASE_BRANCH} への自動作成 PR です。

          ## ブランチ
          - head: \`${BRANCH_NAME}\`
          - base: \`${BASE_BRANCH}\`
          - latest commit: \`${HEAD_SHA}\`

          ## 今回の push に含まれるコミット
          ${COMMIT_MESSAGES}

          ## 変更ファイル
          ${CHANGED_FILES}

          ## 比較
          ${COMPARE_URL}

          ## 備考
          この PR は \`.github/workflows/auto-pr.yml\` により作成・更新されています。TAKT 実行時の詳細レポートはローカルの \`.takt/runs/\` に保存されます。
          EOF
          )

          COMMENT_BODY=$(cat <<EOF
          @codex
          以下の push 内容をレビューしてください。

          ## コミット
          ${COMMIT_MESSAGES}

          ## 変更ファイル
          ${CHANGED_FILES}

          日本語でレビューしてください。
          EOF
          )

          # ラベルの存在確認と作成
          if ! gh label list --json name -q '.[].name' | grep -q "^${LABEL_NAME}$"; then
            echo "Label '${LABEL_NAME}' does not exist. Attempting to create it..."
            gh label create "${LABEL_NAME}" --color "fbca04" --description "Automatically created PR" || echo "Failed to create label."
          fi

          # PRが既に存在するか確認（存在しない場合は empty により空文字になる）
          PR_EXISTS=$(gh pr list --head "${BRANCH_NAME}" --base "${BASE_BRANCH}" --state open --json number -q '.[0].number // empty')

          if [ -n "${PR_EXISTS}" ]; then
            echo "Pull Request already exists: #${PR_EXISTS}. Updating..."
            if gh pr edit "${PR_EXISTS}" --title "${PR_TITLE}" --body "${PR_BODY}" --add-label "${LABEL_NAME}"; then
              echo "Pull Request updated successfully."
            else
              echo "Warning: Failed to update Pull Request with label. Attempting without label..."
              if ! gh pr edit "${PR_EXISTS}" --title "${PR_TITLE}" --body "${PR_BODY}"; then
                echo "Error: Failed to update Pull Request. Please check permissions and branch status."
                exit 1
              fi
              echo "Pull Request updated successfully (without label)."
            fi
            gh pr comment "${PR_EXISTS}" --body "${COMMENT_BODY}"
            echo "Comment added to Pull Request #${PR_EXISTS}."
          else
            echo "Creating Pull Request..."
            # PR作成（失敗時はラベルなしでリトライ）
            if ! gh pr create \
              --head "${BRANCH_NAME}" \
              --base "${BASE_BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}" \
              --label "${LABEL_NAME}"; then

              echo "Failed to create Pull Request with label. Retrying without label..."
              if ! gh pr create \
                --head "${BRANCH_NAME}" \
                --base "${BASE_BRANCH}" \
                --title "${PR_TITLE}" \
                --body "${PR_BODY}"; then
                echo "Error: Failed to create Pull Request. Please check permissions and branch status."
                exit 1
              fi
            fi
            echo "Pull Request created successfully."
            PR_NUMBER=$(gh pr list --head "${BRANCH_NAME}" --base "${BASE_BRANCH}" --state open --json number -q '.[0].number')
            gh pr comment "${PR_NUMBER}" --body "${COMMENT_BODY}"
            echo "Comment added to Pull Request #${PR_NUMBER}."
          fi
