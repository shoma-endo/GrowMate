name: API Changelog Monitor

on:
  schedule:
    # 毎月1日の10:00 JST (= UTC 01:00)に実行
    - cron: '0 1 1 * *'
  workflow_dispatch:

# state 更新PRを作成するため write 権限が必要
permissions:
  contents: write
  pull-requests: write

jobs:
  monitor:
    name: Check API Changelogs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: API changelog チェック & Lark 通知
        run: npx tsx scripts/check-api-changelogs.ts
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          LARK_WEBHOOK_URL: ${{ secrets.API_CHANGELOG_LARK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 状態ファイル更新PRを作成
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: API changelog 状態ファイルを更新 [skip ci]
          title: API changelog 状態ファイルを更新
          body: |
            API changelog monitor が検出状態ファイルを更新しました。

            - 対象: `scripts/api-changelog-state.json`
            - 実行ログ: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: automation/api-changelog-state
          base: develop
          delete-branch: true
          add-paths: scripts/api-changelog-state.json
