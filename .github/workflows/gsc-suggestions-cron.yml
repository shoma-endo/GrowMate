name: GSC Suggestions Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gsc-suggestions-cron
  cancel-in-progress: false

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Invoke GSC suggestions
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "NEXT_PUBLIC_SITE_URL is not set" >&2
            exit 1
          fi
          chmod +x scripts/invoke-cron.sh
          scripts/invoke-cron.sh \
            --url "${SITE_URL}/api/cron/gsc-suggestions" \
            --profile gsc-suggestions
